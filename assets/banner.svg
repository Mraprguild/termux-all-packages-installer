<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0b1020"/>
      <stop offset="0.5" stop-color="#111827"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="text" x1="160" y1="110" x2="1030" y2="250" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#facc15"/>
      <stop offset="1" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.9 0 0 0 0 1 0 0 0 0.7 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="360" rx="28" fill="url(#g)"/>
  <g opacity="0.25">
    <circle cx="150" cy="70" r="90" fill="#22d3ee">
      <animate attributeName="cy" values="70;95;70" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="280" r="120" fill="#fb7185">
      <animate attributeName="cx" values="1040;990;1040" dur="5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <g opacity="0.35">
    <path d="M0 260 C240 180 360 330 600 250 C840 170 930 230 1200 150" stroke="#22d3ee" stroke-width="3">
      <animate attributeName="d" dur="6s" repeatCount="indefinite" values="M0 260 C240 180 360 330 600 250 C840 170 930 230 1200 150;M0 230 C240 300 360 160 600 240 C840 320 930 140 1200 210;M0 260 C240 180 360 330 600 250 C840 170 930 230 1200 150"/>
    </path>
    <path d="M0 110 C250 190 420 40 620 120 C820 200 980 90 1200 130" stroke="#facc15" stroke-width="2">
      <animate attributeName="d" dur="7s" repeatCount="indefinite" values="M0 110 C250 190 420 40 620 120 C820 200 980 90 1200 130;M0 140 C250 50 420 210 620 110 C820 40 980 190 1200 100;M0 110 C250 190 420 40 620 120 C820 200 980 90 1200 130"/>
    </path>
  </g>
  <text x="600" y="145" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800" fill="url(#text)" filter="url(#glow)">MRAPRGUILD TERMUX</text>
  <text x="600" y="210" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#ffffff">All Essential Packages Installer</text>
  <text x="600" y="260" text-anchor="middle" font-family="monospace" font-size="22" fill="#d1d5db">pkg update • git • python • nodejs • php • nginx • ffmpeg • proot</text>
  <rect x="370" y="292" width="460" height="38" rx="19" fill="#020617" opacity="0.75"/>
  <text x="600" y="318" text-anchor="middle" font-family="monospace" font-size="18" fill="#22c55e">One command setup for Android Termux</text>
</svg>
